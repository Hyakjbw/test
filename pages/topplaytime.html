<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Playtime - Dân Cày Chăm Chỉ</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Shader Background đồng bộ -->
    <canvas id="shader-canvas"></canvas>
    <div class="shader-overlay"></div>

    <div class="main-wrapper">
        <header class="page-header">
            <a href="../index.html" class="btn-back">⬅ Quay Về Trang Chủ</a>
            <div class="page-title-box">
                <h2>⏱️ Bảng Xếp Hạng Chăm Chỉ</h2>
                <p>Vinh danh 50 game thủ cống hiến nhiều nhất tại TreMC</p>
            </div>
        </header>

        <main class="table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="text-align: center;">Hạng</th>
                        <th>Tên Người Chơi</th>
                        <th style="text-align: right;">Thời Gian</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </main>
    </div>

    <script src="../js/shader.js"></script> <!-- Gọi shader -->
    <script src="../js/Data.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tbody = document.getElementById('leaderboard-body');
            if (typeof tremcData === 'undefined') {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #ff5252; padding: 30px;">⚠️ Lỗi tải dữ liệu!</td></tr>`;
                return;
            }

            const dataList = tremcData.topplaytime || [];
            if (dataList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--primary); padding: 30px;">Chưa có dữ liệu.</td></tr>`;
                return;
            }

            dataList.forEach((player, index) => {
                const rank = index + 1;
                let rankBadge = rank;
                let rowClass = "";

                if (rank === 1) { rankBadge = `🥇`; rowClass = "rank-first"; }
                else if (rank === 2) { rankBadge = `🥈`; rowClass = "rank-second"; }
                else if (rank === 3) { rankBadge = `🥉`; rowClass = "rank-third"; }

                const row = document.createElement('tr');
                if (rowClass) row.className = rowClass;
                
                row.innerHTML = `
                    <td style="text-align: center; font-weight: 800;">${rankBadge}</td>
                    <td>
                        <span class="player-avatar">⏱️</span> 
                        <strong>${player.player_name}</strong>
                    </td>
                    <td style="text-align: right; color: #00f0ff; font-family: monospace; font-weight: bold;">${player.timePlayer} giờ</td>
                `;
                tbody.appendChild(row);
            });
        });
    </script>
</body>
</html>
