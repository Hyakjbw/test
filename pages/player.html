<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Người Chơi</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">MC-SERVER</div>
            <ul class="nav-links">
                <li><a href="../index.html" class="nav-item">Trang Chính</a></li>
                <li><a href="player.html" class="nav-item">Thông Tin Người Chơi</a></li>
                <li><a href="toptier.html" class="nav-item">Top Tier</a></li>
                <li><a href="topbal.html" class="nav-item">Top Bal</a></li>
                <li><a href="topplaytime.html" class="nav-item">Top Thời Gian</a></li>
                <li><a href="topdonate.html" class="nav-item">Top Donate</a></li>
                <li><a href="updates.html" class="nav-item">Bản Update</a></li>
                <li><a href="shop.html" class="nav-item">Cửa Hàng</a></li>
                <li><a href="manager.html" class="nav-item admin-tab">Manager</a></li>
            </ul>
        </nav>
        <main class="content">
            <h2>Tra Cứu Người Chơi</h2>
            
            <div class="search-box" style="margin-bottom: 25px; display: flex; gap: 10px;">
                <input type="text" placeholder="Nhập tên người chơi..." style="flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #2d2d2d; background: #1e1e1e; color: #fff;">
                <button style="padding: 12px 20px; background: #4caf50; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Tìm kiếm</button>
            </div>

            <div class="card">
                <h3>Thống kê của: <span style="color: #4caf50;">Steve_Hero</span></h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 15px;">
                    <div style="background: #252525; padding: 15px; border-radius: 6px; text-align: center;">
                        <p style="color: #888; font-size: 14px;">Điểm số (Tier)</p>
                        <h4 style="font-size: 24px; margin-top: 5px; color: #fff;">4,500</h4>
                    </div>
                    <div style="background: #252525; padding: 15px; border-radius: 6px; text-align: center;">
                        <p style="color: #888; font-size: 14px;">Tài sản (Balance)</p>
                        <h4 style="font-size: 24px; margin-top: 5px; color: #ff9800;">1,200,000 xu</h4>
                    </div>
                    <div style="background: #252525; padding: 15px; border-radius: 6px; text-align: center;">
                        <p style="color: #888; font-size: 14px;">Thời gian chơi</p>
                        <h4 style="font-size: 24px; margin-top: 5px; color: #00bcd4;">72 giờ</h4>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
